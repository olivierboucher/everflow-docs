                  type: integer
                  description: Timezone ID for the report.
                query:
                  type: object
                  description: Optional filters to narrow results.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      description: Pixel log entry.
      security:
        - API Key: []

  /networks/reporting/transactions/{transactionId}/flowchart:
    get:
      summary: Get Transaction Flowchart
      description: >
        Returns the full event chain for a transaction. Shows the complete
        sequence of events from the initial click through conversion, post-
        conversion events, and postback firings. Useful for debugging
        attribution and tracking flows.
      tags:
        - Reporting
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
          description: The transaction ID to retrieve the flowchart for.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: >
                  Transaction flowchart showing the full event chain
                  (click, conversion, events, postbacks).
      security:
        - API Key: []

  /networks/reporting/events/pertransaction:
    post:
      summary: Get Events Per Transaction
      description: >
        Returns events grouped by transaction. Shows all post-conversion events
        and their details for each transaction in the specified time range.
      tags:
        - Reporting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - to
                - timezone_id
              properties:
