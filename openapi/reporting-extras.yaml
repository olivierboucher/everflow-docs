                  description: "End date (format: YYYY-MM-DD)."
                timezone_id:
                  type: integer
                  description: Timezone ID for the report.
                query:
                  type: object
                  description: Optional filters to narrow results.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Events grouped by transaction.
      security:
        - API Key: []

  /networks/reporting/mtti:
    post:
      summary: Get MTTI Report
      description: >
        Returns the Mean Time to Install (MTTI) report. Measures the average
        time between a click and a conversion (install) for mobile app
        campaigns. Useful for detecting fraud patterns or optimizing
        campaign performance.
      tags:
        - Reporting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - to
                - timezone_id
              properties:
                from:
                  type: string
                  description: "Start date (format: YYYY-MM-DD)."
                to:
                  type: string
                  description: "End date (format: YYYY-MM-DD)."
                timezone_id:
                  type: integer
                  description: Timezone ID for the report.
                currency_id:
                  type: string
                  description: Currency code for reporting metrics.
                query:
                  type: object
                  description: Optional filters to narrow results.
      responses:
        "200":
          description: OK
          content:
