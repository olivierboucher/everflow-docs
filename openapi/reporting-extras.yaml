                  type: string
                  description: "Start date (format: YYYY-MM-DD)."
                to:
                  type: string
                  description: "End date (format: YYYY-MM-DD)."
                timezone_id:
                  type: integer
                  description: Timezone ID for the report.
                query:
                  type: object
                  description: Optional filters to narrow results.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      description: Pixel log entry.
      security:
        - API Key: []

  /networks/reporting/pixels/log:
    post:
      summary: Get Partner Pixel Log
      description: >
        Returns partner (affiliate) pixel firing log data. Shows when partner
        postback pixels were fired, their HTTP response status, and any errors
