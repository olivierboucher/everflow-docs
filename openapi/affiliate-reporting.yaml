components:
  schemas:
    DashboardMetric:
      type: object
      description: A dashboard metric with period comparisons and trend.
      properties:
        today:
          type: number
          description: Value for today.
        yesterday:
          type: number
          description: Value for yesterday.
        current_month:
          type: number
          description: Value for the current month to date.
        last_month:
          type: number
          description: Value for the previous month.
        trending_percentage:
          type: number
          description: Percentage change indicating the trend direction.
  securitySchemes:
    API Key:
      description: >
        The affiliate's API key generated from the Affiliate Portal.
        Uses the same X-Eflow-Api-Key header as the Network API, but the key
        belongs to the affiliate user rather than the network admin.
      in: header
      name: X-Eflow-Api-Key
      type: apiKey
