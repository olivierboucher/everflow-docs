  /affiliates/reporting/conversions/stream:
    post:
      summary: Stream Conversions
      description: >
        Streaming variant of the conversion report for large datasets. Returns
        individual conversion records incrementally rather than as a single
        paginated response. Use this when expecting a large number of conversions
        to avoid timeout issues.
      tags:
        - Affiliate Reporting
      requestBody:
        required: true
        content:
          application/json:
            example:
              from: "2024-01-01"
              to: "2024-01-31"
              timezone_id: 67
              show_conversions: true
              show_events: true
              query:
                filters: []
            schema:
              type: object
              required:
                - from
                - to
                - timezone_id
              properties:
                from:
                  type: string
                  description: Start date. Format `YYYY-MM-DD`.
                to:
                  type: string
                  description: End date. Format `YYYY-MM-DD`.
                timezone_id:
                  type: integer
                  description: Timezone identifier for the date range.
                show_conversions:
                  type: boolean
                  description: Include conversion records in the response.
                  default: true
                show_events:
                  type: boolean
                  description: Include post-conversion event records.
                  default: false
                query:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        type: object
                        properties:
                          filter_id_value:
                            type: string
                          resource_type:
                            type: string
      responses:
        "200":
          description: OK. Response is streamed incrementally.
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversions:
                    type: array
                    description: Array of conversion records (streamed).
                    items:
                      type: object
                      properties:
                        network_conversion_id:
                          type: integer
                        transaction_id:
                          type: string
                        conversion_unix_timestamp:
                          type: integer
                        revenue:
                          type: number
                        conversion_status:
                          type: string
                        sub1:
                          type: string
                        sub2:
                          type: string
                        sub3:
                          type: string
                        sub4:
                          type: string
                        sub5:
                          type: string
      security:
        - API Key: []

  /affiliates/reporting/postconversions:
    post:
      summary: Search Post-Conversion Events
      description: >
        Returns post-conversion event data for the authenticated affiliate.
        Post-conversion events are additional actions tracked after the initial
        conversion, such as upsells, registrations, or in-app purchases.
      tags:
        - Affiliate Reporting
      requestBody:
        required: true
        content:
          application/json:
            example:
              from: "2024-01-01"
              to: "2024-01-31"
              timezone_id: 67
              query:
                filters: []
            schema:
              type: object
              required:
                - from
                - to
                - timezone_id
              properties:
                from:
                  type: string
                  description: Start date. Format `YYYY-MM-DD`.
                to:
                  type: string
                  description: End date. Format `YYYY-MM-DD`.
                timezone_id:
                  type: integer
                  description: Timezone identifier for the date range.
                query:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        type: object
                        properties:
                          filter_id_value:
                            type: string
                          resource_type:
                            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversions:
                    type: array
                    description: Array of post-conversion event records.
                    items:
                      type: object
                      properties:
                        network_conversion_id:
                          type: integer
                          description: Unique conversion identifier.
                        transaction_id:
                          type: string
                          description: Associated click transaction ID.
                        conversion_unix_timestamp:
                          type: integer
                          description: Unix timestamp of the event.
                        revenue:
                          type: number
                          description: Revenue for the event.
                        event_name:
