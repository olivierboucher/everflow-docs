  /affiliates/reporting/offer:
    post:
      summary: Get Offer Report
      description: >
        Returns per-offer aggregated metrics for the authenticated affiliate.
        Each row represents an offer with its associated performance metrics.
        This is a convenience endpoint for quickly viewing offer-level performance
        without configuring a full entity/table request.
      tags:
