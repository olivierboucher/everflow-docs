  /networks/reporting/conversions/{conversionId}/payoutrevenue:
    put:
      summary: Update Conversion Payout and Revenue
      description: >
        Update payout and revenue for an approved conversion. Amounts must be
        absolute values, not percentages.
      tags:
        - Reporting
      parameters:
        - in: path
          name: conversionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - payout
                - revenue
              properties:
                payout:
                  type: number
                revenue:
                  type: number
              type: object
            example:
              payout: 10.50
              revenue: 15.00
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  result:
                    type: boolean
                    description: Whether the operation was accepted.
                type: object
          description: OK
      security:
        - API Key: []
components:
