                          - offer
                          - affiliate
                          - creative
                          - offer_url
                          - country
                          - country_code
                          - region
                          - city
                          - dma
                          - carrier
                          - platform
                          - isp
                          - os_version
                          - device_type
                          - device_model
                          - device_make
                          - browser
                          - language
                          - sub1
                          - sub2
                          - sub3
                          - sub4
                          - sub5
                          - source_id
                          - connection_type
                          - advertiser_campaign_name
                          - app_identifier
                          - bundle_id
                          - meta_platform
                          - score_rating
                          - total_rating
                          - size
                          - developer
                          - version
                          - hour
                          - date
                          - week
                          - month
                          - year
                        description: >
                          The dimension to group by. Time columns (hour, date, week,
                          month, year) are mutually exclusive — only one allowed at a time.
                query:
                  type: object
                  description: Query configuration for filtering, metric filtering, and exclusions.
                  properties:
                    filters:
                      type: array
