                      items:
                        type: object
                        properties:
                          column:
                            type: string
                            description: The metric column to filter on.
                          operator:
                            type: string
                            enum:
                              - gt
                              - gte
                              - lt
                              - lte
                              - eq
                            description: Comparison operator.
                          value:
                            type: number
