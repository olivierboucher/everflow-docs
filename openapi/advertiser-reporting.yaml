      description: >
        Streaming variant of the entity table report for large datasets. Uses the
        same request format as the table endpoint but returns data as a stream,
        bypassing the 10,000-row limit.


        Data is automatically scoped to the authenticated advertiser. Maximum
        reporting interval is one year (365 days).
      tags:
        - Advertiser Reporting
      requestBody:
        required: true
        content:
          application/json:
            example:
              from: "2024-01-01"
              to: "2024-01-31"
              timezone_id: 67
              currency_id: "USD"
              columns:
                - column: "offer"
              query:
                filters: []
            schema:
              type: object
              required:
                - from
                - to
                - timezone_id
                - currency_id
                - columns
              properties:
                from:
                  type: string
                  description: Start date for the reporting period. Format `YYYY-MM-DD`.
                to:
                  type: string
                  description: End date for the reporting period. Format `YYYY-MM-DD`.
                timezone_id:
                  type: integer
                  description: Timezone identifier for the request.
                currency_id:
                  type: string
