                          operator:
                            type: string
                            enum:
                              - gt
                              - gte
                              - lt
                              - lte
                              - eq
                            description: Comparison operator.
                          value:
                            type: number
                            description: Threshold value.
      responses:
        "200":
          description: OK — Returns streaming reporting data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  table:
                    type: array
                    description: Streamed array of reporting data rows grouped by the requested columns.
                    items:
                      type: object
                      properties:
                        columns:
                          type: array
                          description: Dimension values for this row.
                          items:
                            type: object
                            properties:
                              column_type:
                                type: string
                                description: The column/dimension type.
                              id:
                                type: string
                                description: Dimension value identifier.
                              label:
                                type: string
                                description: Human-readable label for the dimension value.
                        reporting:
                          $ref: "#/components/schemas/ReportingMetrics"
      security:
        - API Key: []
  /advertisers/reporting/clicks/{transactionId}:
    get:
      summary: Get Click
      description: >
        Retrieve click details by transaction ID. Returns the full click object
        including geo-location, device information, and sub-placement values.
      tags:
        - Advertiser Reporting
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
          description: The click transaction ID.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                    description: The click transaction ID.
                  click_unix_timestamp:
                    type: integer
                    description: Unix timestamp of when the click occurred.
                  ip:
                    type: string
                    description: IP address of the clicking user.
                  user_agent:
                    type: string
                    description: User agent string.
                  country:
                    type: string
                    description: Country of the clicking user.
                  country_code:
                    type: string
                    description: ISO country code.
                  region:
                    type: string
                    description: Region/state of the clicking user.
                  city:
                    type: string
                    description: City of the clicking user.
                  dma:
                    type: integer
                    description: Designated Market Area code.
                  carrier:
                    type: string
                    description: Mobile carrier name.
                  platform:
                    type: string
                    description: Operating system platform.
                  os_version:
                    type: string
                    description: Operating system version.
                  device_type:
                    type: string
                    description: Device type (e.g. desktop, mobile, tablet).
                  device_model:
                    type: string
                    description: Device model name.
                  device_make:
                    type: string
                    description: Device manufacturer.
                  browser:
                    type: string
                    description: Browser name.
                  language:
                    type: string
                    description: Browser language.
                  connection_type:
                    type: string
                    description: Connection type (e.g. wifi, cellular).
                  isp:
                    type: string
                    description: Internet service provider.
                  sub1:
                    type: string
                    description: Sub-placement value 1.
                  sub2:
                    type: string
                    description: Sub-placement value 2.
                  sub3:
                    type: string
                    description: Sub-placement value 3.
                  sub4:
                    type: string
                    description: Sub-placement value 4.
                  sub5:
                    type: string
                    description: Sub-placement value 5.
                  relationship:
                    type: object
                    description: Related entities for this click.
                    properties:
                      offer:
                        type: object
                        properties:
                          network_offer_id:
                            type: integer
                            description: Offer ID.
                          name:
                            type: string
                            description: Offer name.
                      affiliate:
                        type: object
                        properties:
                          network_affiliate_id:
                            type: integer
                            description: Affiliate ID.
                          name:
                            type: string
                            description: Affiliate name.
        "404":
          description: Click not found.
      security:
        - API Key: []
  /advertisers/reporting/conversions/stream:
    post:
      summary: Stream Conversions
      description: >
        Streaming variant of the conversion report for large datasets. Uses the
        same request format as the Search Conversions endpoint but returns data
        as a stream for efficient processing of large result sets.


        The conversion report is limited to the prior 365 days and a maximum duration
        of one year.
      tags:
        - Advertiser Reporting
      requestBody:
        required: true
        content:
          application/json:
            example:
              show_conversions: true
              show_events: false
              from: "2024-01-01"
              to: "2024-01-31"
              timezone_id: 67
              currency_id: "USD"
              query:
                filters: []
            schema:
              type: object
              required:
                - show_conversions
                - show_events
                - from
                - to
                - timezone_id
              properties:
                show_conversions:
                  type: boolean
                  description: Whether to include base conversions in the results.
                show_events:
                  type: boolean
                  description: Whether to include post-conversion events in the results.
                show_only_vt:
                  type: boolean
                  description: When true, only return view-through conversions.
                show_only_ct:
                  type: boolean
                  description: When true, only return click-through conversions.
                from:
                  type: string
                  description: Start date. Format `YYYY-MM-DD` or `YYYY-MM-DD hh:mm:ss`.
                to:
                  type: string
                  description: End date. Format `YYYY-MM-DD` or `YYYY-MM-DD hh:mm:ss`.
                timezone_id:
                  type: integer
                  description: Timezone identifier for the request.
                currency_id:
                  type: string
                  description: Currency code for monetary values (e.g. "USD").
                query:
                  type: object
                  description: Query configuration for filtering.
                  properties:
                    filters:
                      type: array
                      description: Filters to narrow results.
                      items:
                        type: object
                        properties:
                          filter_id_value:
                            type: string
                            description: The value to filter on.
                          resource_type:
                            type: string
                            description: The resource type to filter on.
      responses:
        "200":
          description: OK — Returns streaming conversion data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversions:
                    type: array
                    description: Streamed array of conversion objects.
                    items:
                      $ref: "#/components/schemas/Conversion"
      security:
        - API Key: []
components:
  securitySchemes:
    API Key:
      description: >
        The advertiser's API key generated from the Advertiser Portal.
        Uses the same X-Eflow-Api-Key header as other Everflow APIs, but the key
        belongs to the advertiser user rather than the network admin.
      in: header
      name: X-Eflow-Api-Key
      type: apiKey
  schemas:
    ReportingMetrics:
      type: object
      description: Aggregated performance metrics.
      properties:
        imp:
          type: integer
          description: Impression count.
        total_click:
          type: integer
          description: Total click count.
        unique_click:
          type: integer
          description: Unique click count.
        invalid_click:
          type: integer
          description: Invalid/filtered click count.
        duplicate_click:
          type: integer
          description: Duplicate click count.
        cv:
          type: integer
          description: Conversion count.
        view_through_cv:
          type: integer
          description: View-through conversion count.
        event:
          type: integer
          description: Post-conversion event count.
        cvr:
          type: number
          description: Conversion rate (percentage).
        evr:
          type: number
          description: Event rate.
        ctr:
          type: number
          description: Click-through rate (impressions to clicks).
        cost:
          type: number
          description: Total cost (advertiser spend).
        cpc:
          type: number
          description: Cost per click.
        cpm:
          type: number
          description: Cost per mille (per 1,000 impressions).
    Conversion:
      type: object
      description: A single conversion record with full details.
      properties:
        conversion_id:
          type: integer
          description: Unique conversion ID.
        conversion_unix_timestamp:
          type: integer
          description: Unix timestamp of when the conversion occurred.
        cost_type:
          type: string
          description: Cost type for this conversion (e.g. cpa, cpc).
        cost:
          type: number
          description: Cost amount for this conversion.
        sale_amount:
          type: number
          description: Sale amount associated with this conversion.
        ip:
          type: string
          description: IP address of the converting user.
        click_ip:
          type: string
          description: IP address at time of the original click.
        user_agent:
          type: string
          description: User agent string of the converting user.
        country:
          type: string
          description: Country of the converting user.
        country_code:
          type: string
          description: ISO country code.
        region:
          type: string
          description: Region/state of the converting user.
        city:
          type: string
          description: City of the converting user.
        dma:
          type: integer
          description: Designated Market Area code.
        carrier:
          type: string
          description: Mobile carrier name.
        platform:
          type: string
          description: Operating system platform.
        os_version:
          type: string
          description: Operating system version.
        device_type:
          type: string
          description: Device type (e.g. desktop, mobile, tablet).
        device_model:
          type: string
          description: Device model name.
        device_make:
          type: string
          description: Device manufacturer.
        browser:
          type: string
          description: Browser name.
        language:
          type: string
          description: Browser language.
        connection_type:
          type: string
          description: Connection type (e.g. wifi, cellular).
        isp:
          type: string
          description: Internet service provider.
        adv1:
          type: string
          description: Advertiser sub-parameter 1.
        adv2:
          type: string
          description: Advertiser sub-parameter 2.
        adv3:
          type: string
          description: Advertiser sub-parameter 3.
        adv4:
          type: string
          description: Advertiser sub-parameter 4.
        adv5:
          type: string
          description: Advertiser sub-parameter 5.
        transaction_id:
          type: string
          description: Click transaction ID associated with this conversion.
        is_event:
          type: boolean
          description: Whether this is a post-conversion event (true) or base conversion (false).
        event_name:
          type: string
          description: Name of the post-conversion event (if is_event is true).
        is_view_through:
          type: boolean
          description: Whether this is a view-through conversion.
        is_unique:
          type: boolean
          description: Whether this conversion is unique.
        coupon_code:
          type: string
          description: Coupon code used for this conversion.
        time_created:
          type: integer
          description: Unix timestamp of when the conversion record was created.
        relationship:
          type: object
          description: Related entities for this conversion.
          properties:
            offer:
              type: object
              description: The offer associated with this conversion.
              properties:
                network_offer_id:
                  type: integer
                  description: Offer ID.
                name:
                  type: string
                  description: Offer name.
            affiliate:
              type: object
              description: The affiliate associated with this conversion.
              properties:
                network_affiliate_id:
                  type: integer
                  description: Affiliate ID.
                name:
                  type: string
                  description: Affiliate name.
    DashboardMetric:
      type: object
      description: A dashboard metric with period comparisons and trending data.
      properties:
        current_month:
          type: number
          description: Value for the current month to date.
        last_month:
          type: number
          description: Value for the entire previous month.
        today:
          type: number
          description: Value for the current day so far.
        yesterday:
          type: number
          description: Value for the full previous day.
        trending_percentage:
          type: number
          description: Month-over-month trending percentage.
