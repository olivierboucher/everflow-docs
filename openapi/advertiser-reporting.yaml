                          - os_version
                          - device_type
                          - device_model
                          - device_make
                          - browser
                          - language
                          - sub1
                          - sub2
                          - sub3
                          - sub4
                          - sub5
                          - source_id
                          - connection_type
                          - advertiser_campaign_name
                          - app_identifier
                          - bundle_id
                          - meta_platform
                          - score_rating
                          - total_rating
                          - size
                          - developer
                          - version
                          - hour
                          - date
                          - week
                          - month
                          - year
                        description: >
