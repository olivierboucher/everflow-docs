        monthly_conversion_cap:
          type: integer
        global_conversion_cap:
          type: integer
        daily_payout_cap:
          type: integer
        weekly_payout_cap:
          type: integer
        monthly_payout_cap:
          type: integer
        global_payout_cap:
          type: integer
        daily_revenue_cap:
          type: integer
        weekly_revenue_cap:
          type: integer
        monthly_revenue_cap:
          type: integer
        global_revenue_cap:
          type: integer
        daily_click_cap:
          type: integer
        weekly_click_cap:
          type: integer
        monthly_click_cap:
          type: integer
        global_click_cap:
          type: integer
        is_duplicate_filter_enabled:
          type: boolean
        duplicate_filter_targeting_action:
          type: string
          enum:
            - block
            - fail_traffic
        is_block_already_converted:
          type: boolean
        already_converted_action:
          type: string
