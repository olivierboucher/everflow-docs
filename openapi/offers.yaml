        is_seo_friendly:
          type: boolean
        is_allow_deep_link:
          type: boolean
        is_whitelist_check_enabled:
          type: boolean
        is_use_direct_linking:
          type: boolean
        is_caps_enabled:
          type: boolean
        daily_conversion_cap:
          type: integer
