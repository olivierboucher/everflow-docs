  /networks/tracking/offers/clicks:
    post:
      summary: Generate Tracking Link
      description: >
        Generate a click tracking link for an offer and affiliate pair.
        The affiliate must have visibility on the offer and be allowed to run it.
        Returns a ready-to-use tracking URL.
      tags:
        - Tracking Links
      requestBody:
        required: true
        content:
          application/json:
            example:
              network_offer_id: 1
              network_affiliate_id: 1
            schema:
              type: object
              required:
                - network_offer_id
                - network_affiliate_id
              properties:
                network_offer_id:
                  type: integer
                  description: The offer to generate the tracking link for.
                network_affiliate_id:
                  type: integer
                  description: The affiliate to associate with the link.
                network_tracking_domain_id:
                  type: integer
                  description: Override the default tracking domain.
                network_offer_url_id:
                  type: integer
                  description: Use a specific offer URL (must belong to the specified offer).
                creative_id:
                  type: integer
                  description: Associate a creative with the link (must belong to the specified offer).
                network_traffic_source_id:
                  type: integer
                  description: Traffic source ID. Ignored if the affiliate has a default traffic source.
                source_id:
                  type: string
                  description: Custom source identifier.
                sub1:
                  type: string
                  description: Sub-parameter 1 for tracking.
                sub2:
                  type: string
                  description: Sub-parameter 2 for tracking.
                sub3:
                  type: string
                  description: Sub-parameter 3 for tracking.
                sub4:
                  type: string
                  description: Sub-parameter 4 for tracking.
                sub5:
                  type: string
                  description: Sub-parameter 5 for tracking.
                is_encrypt_parameters:
                  type: boolean
                  description: Whether to encrypt the URL parameters.
                is_redirect_link:
                  type: boolean
                  description: Override the direct linking setting for this link.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: The generated tracking link URL.
      security:
        - API Key: []
  /networks/channels:
    get:
      summary: List Channels
      description: >
        Retrieve all channels for the network. Returns a paginated list.
        Channels are used to organize offers into logical groups for reporting
        and management purposes.
      tags:
        - Channels
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number (1-based).
        - in: query
          name: page_size
          schema:
            type: integer
            default: 50
          description: Number of results per page.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        network_channel_id:
                          type: integer
                          description: Unique channel ID.
                        network_id:
                          type: integer
                        name:
                          type: string
                          description: Channel name.
                        status:
                          type: string
                          enum:
                            - active
                            - inactive
                          description: Channel status.
                        time_created:
                          type: integer
                          description: Unix timestamp of creation.
                        time_saved:
                          type: integer
                          description: Unix timestamp of last update.
                        relationship:
                          type: object
                          properties:
                            offers_count:
                              type: string
                              description: Number of offers in this channel.
                  paging:
                    type: object
                    properties:
                      page:
                        type: integer
                      page_size:
                        type: integer
                      total_count:
                        type: integer
      security:
        - API Key: []
    post:
      summary: Create Channel
      description: >
        Create a new channel. Channels are used to categorize and organize
        offers for reporting and management.
      tags:
        - Channels
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: "Display Ads"
              status: "active"
            schema:
              type: object
              required:
                - name
                - status
              properties:
                name:
                  type: string
                  description: Channel name.
                status:
                  type: string
                  enum:
                    - active
                    - inactive
                  description: Channel status.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  network_channel_id:
                    type: integer
                    description: The newly created channel ID.
                  network_id:
                    type: integer
                  name:
                    type: string
                  status:
                    type: string
                  time_created:
                    type: integer
                  time_saved:
                    type: integer
      security:
        - API Key: []
  /networks/labels:
    get:
      summary: List Labels
      description: >
        Retrieve all labels for the network. Labels can be applied to offers,
        affiliates, advertisers, campaigns, and offer groups to organize and
        filter resources.
      tags:
        - Labels
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    label:
                      type: string
                      description: The label name.
                    advertiser_ids:
                      type: array
                      items:
                        type: integer
                      description: Advertiser IDs this label is applied to.
                    affiliate_ids:
                      type: array
                      items:
                        type: integer
                      description: Affiliate IDs this label is applied to.
                    campaign_ids:
                      type: array
                      items:
                        type: integer
                      description: Campaign IDs this label is applied to.
                    offer_ids:
                      type: array
                      items:
                        type: integer
                      description: Offer IDs this label is applied to.
                    offer_group_ids:
                      type: array
                      items:
                        type: integer
                      description: Offer group IDs this label is applied to.
      security:
        - API Key: []
  /networks/encode:
    post:
      summary: Encode IDs
      description: >
        Encode numeric Everflow IDs into their encoded string representation.
        Useful for constructing tracking links, signup URLs, and other contexts
        where encoded IDs are required instead of raw numeric IDs.
      tags:
        - Encoding
      requestBody:
        required: true
        content:
          application/json:
            example:
              type: "tracking_link_affiliate"
              ids: [1, 2, 3]
            schema:
              type: object
              required:
                - type
                - ids
              properties:
                type:
                  type: string
                  enum:
                    - tracking_link_affiliate
                    - tracking_link_offer
                    - smart_link_affiliate
                    - smart_link_smart_link
                    - signup_affiliate_employee
                    - signup_advertiser_employee
                    - signup_affiliate_affiliate
                  description: >
                    The encoding context. Determines how the IDs are encoded
                    based on their intended use.
                ids:
                  type: array
                  items:
                    type: integer
                  description: The numeric IDs to encode.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  values:
                    type: array
                    items:
                      type: object
                      properties:
                        decoded:
                          type: integer
                          description: The original numeric ID.
                        encoded:
                          type: string
                          description: The encoded string representation.
      security:
        - API Key: []
components:
  securitySchemes:
    API Key:
      description: The Everflow API key generated from the Control Center > Security.
      in: header
      name: X-Eflow-Api-Key
      type: apiKey
