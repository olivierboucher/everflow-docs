openapi: 3.0.3
info:
  title: Everflow Network API
  description: >
    REST API for the Everflow partner marketing platform. Manage offers,
    affiliates, advertisers, tracking links, and reporting data.
    All requests require an API key passed via the X-Eflow-API-Key header.
    Base URL: https://api.eflow.team/v1
  version: 1.0.0
servers:
  - description: Production Server
    url: https://api.eflow.team/v1
tags:
  - name: Reporting
    description: Endpoints for extracting clicks, conversions, and aggregated reporting data.
  - name: Offers
    description: Endpoints for searching and managing offers.
  - name: Affiliates
    description: Endpoints for searching and managing affiliates.
  - name: Advertisers
    description: Endpoints for managing advertisers.
  - name: Tracking Links
    description: Endpoints for generating click tracking links.
  - name: Channels
    description: Endpoints for managing channels used to organize offers.
  - name: Labels
    description: Endpoints for managing labels applied to resources.
  - name: Encoding
    description: Endpoints for encoding and decoding Everflow IDs.
paths:
  /networks/reporting/clicks/{transactionId}:
    get:
      summary: Get Click by Transaction ID
      description: Fetch a single click by its unique Everflow transaction ID. Returns the full click record including device info, geo data, and tracking parameters.
      tags:
        - Reporting
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
